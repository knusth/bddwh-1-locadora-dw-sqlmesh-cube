# =============================================================================
# PostgreSQL Configuration - Data Warehouse Workload
# Banco: locadora_dwh
# Propósito: Carga analítica ELT com SQLMesh
# Hardware assumido: 4 vCPU, 8GB RAM, SSD NVMe
# =============================================================================

# -----------------------------------------------------------------------------
# Conexões e Autenticação
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# Memória - Otimizado para workload analítico com joins grandes e sorts
# -----------------------------------------------------------------------------
shared_buffers = 2GB                    # Cache de páginas do PostgreSQL
work_mem = 256MB                        # Memória por operação de sort/hash/join
maintenance_work_mem = 512MB            # VACUUM, CREATE INDEX, ALTER TABLE
effective_cache_size = 4GB              # Memória total disponível para cache (OS + PG)
dynamic_shared_memory_type = posix

# -----------------------------------------------------------------------------
# Paralelismo - Aproveitar múltiplos cores para queries analíticas
# -----------------------------------------------------------------------------
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
max_worker_processes = 8

# -----------------------------------------------------------------------------
# WAL (Write-Ahead Logging) - Otimizado para carga batch (ELT)
# -----------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 4GB
min_wal_size = 1GB
wal_compression = on
wal_level = replica

# -----------------------------------------------------------------------------
# Query Planner - Ajustes para storage SSD e tabelas grandes
# -----------------------------------------------------------------------------
random_page_cost = 1.1                  # SSD NVMe: acesso aleatório quase igual ao sequencial
effective_io_concurrency = 200          # SSD suporta alta concorrência de I/O
default_statistics_target = 500         # Estatísticas mais detalhadas para otimização
constraint_exclusion = partition        # Essencial para partionamento

# -----------------------------------------------------------------------------
# Logging - Rastreabilidade e diagnóstico
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000       # Loga queries acima de 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                      # Loga todos os temp files (indicador de work_mem insuficiente)
log_autovacuum_min_duration = 0
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# -----------------------------------------------------------------------------
# Autovacuum - Manutenção de tabelas com carga incremental frequente
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05   # VACUUM mais agressivo para tabelas grandes
autovacuum_analyze_scale_factor = 0.05

# -----------------------------------------------------------------------------
# Locale e Formato
# -----------------------------------------------------------------------------
datestyle = 'iso, dmy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.portuguese'

# -----------------------------------------------------------------------------
# Extensões e Funcionalidades
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000